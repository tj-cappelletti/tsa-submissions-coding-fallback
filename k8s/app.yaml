apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsa-submissions-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tsa-submissions-web
  template:
    metadata:
      labels:
        app: tsa-submissions-web
    spec:
      containers:
        - name: web
          image: tsa-submissions-web:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: tsa-db-secrets
                  key: app-connection-string
---
apiVersion: v1
kind: Service
metadata:
  name: tsa-submissions-web
spec:
  selector:
    app: tsa-submissions-web
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
